# -- FPP WLED API Proxy — lighttpd URL Rewriting
#
# Installed to: /etc/lighttpd/conf-enabled/88-wled-proxy.conf
# by fpp_install.sh
#
# Routes WLED-compatible API paths (/json/*, /win) to the plugin's PHP
# handler so that WLED apps can use FPP's IP address directly without any
# path prefix.
#
# The "88-" prefix ensures this loads after FPP's own configs (which are
# typically 00-* to 60-*) but the numeric prefix can be adjusted if there
# are ordering conflicts.
#
# IMPORTANT: lighttpd must have mod_rewrite loaded.
# FPP's default lighttpd.conf loads mod_rewrite, so this should work
# out-of-the-box on standard FPP installs.
# ---

server.modules += ( "mod_rewrite" )

# -- Rewrite /json/* to WLED PHP handler
#
# PHP receives $_SERVER['REQUEST_URI'] = "/json/state" (original path),
# so the handler can route correctly even after rewriting.
#
# Note: url.rewrite-once preserves the query string from the original request.
# e.g. GET /win?bri=200&fx=1 → PHP handler with $_GET['bri']=200, $_GET['fx']=1

url.rewrite-once = (
    # WLED JSON API
    "^/json/effects"   => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json/palettes"  => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json/state"     => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json/info"      => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json/si"        => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json/nodes"     => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json/eff"       => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json/pal"       => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json$"          => "/plugin/fpp-WLEDProxy/wled_api.php",
    "^/json/$"         => "/plugin/fpp-WLEDProxy/wled_api.php",

    # WLED HTTP Request API (legacy / simple integrations)
    # Note: lighttpd url.rewrite-once matches on the URL path only (no query string),
    # so "^/win" matches /win, /win?bri=200, etc.  Query string is passed through as-is.
    "^/win"            => "/plugin/fpp-WLEDProxy/wled_api.php"
)
